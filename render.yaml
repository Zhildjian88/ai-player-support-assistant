# ── render.yaml ───────────────────────────────────────────────────────────────
services:
  - type: web
    name: ai-player-support-assistant
    runtime: docker
    dockerfilePath: Dockerfile.render
    plan: free
    autoDeploy: true
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: LLM_MODEL
        value: gemini-2.0-flash
      - key: LLM_GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: ENABLE_LLM_FALLBACK
        value: "true"
      - key: USE_NEURAL_EMBEDDINGS
        value: "false"
      - key: ENABLE_AUDIT_LOG
        value: "true"
      - key: ENABLE_ESCALATION
        value: "true"
      - key: PORT
        value: "8000"
